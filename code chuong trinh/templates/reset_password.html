<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đặt lại mật khẩu - Smart Home</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            width: 100%;
            max-width: 480px;
            background: white;
            border-radius: 14px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            padding: 22px;
        }
        h1 { color: #4a5fcb; margin-bottom: 10px; }
        p { color: #666; margin-bottom: 16px; }
        .input {
            width: 100%;
            border: 2px solid #ddd;
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 10px;
            font-size: 15px;
        }
        .input:focus { outline: none; border-color: #667eea; }
        .btn {
            width: 100%;
            border: none;
            border-radius: 10px;
            background: #667eea;
            color: white;
            font-weight: 700;
            padding: 12px;
            cursor: pointer;
            margin-top: 4px;
        }
        .btn:hover { background: #5568d3; }
        .status {
            margin-top: 12px;
            border-radius: 10px;
            padding: 10px 12px;
            background: #f3f6ff;
            color: #1f3768;
            font-weight: 600;
            min-height: 42px;
            word-break: break-word;
        }
        .links { margin-top: 14px; text-align: center; }
        .links a { color: #4a5fcb; text-decoration: none; font-weight: 600; font-size: 14px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>♻️ Đặt lại mật khẩu</h1>
        <p>Nhập tài khoản, reset token và mật khẩu mới.</p>
        <input id="username" class="input" placeholder="Tên đăng nhập">
        <input id="token" class="input" placeholder="Reset token">
        <input id="newPassword" type="password" class="input" placeholder="Mật khẩu mới">
        <button id="btnReset" class="btn">Đặt lại mật khẩu</button>
        <div id="status" class="status">Nhập thông tin để đặt lại mật khẩu.</div>
        <div class="links"><a href="/login">Quay lại đăng nhập</a></div>
    </div>

    <script>
        const statusEl = document.getElementById('status');

        function fillFromQuery() {
            const params = new URLSearchParams(window.location.search);
            const username = params.get('username') || '';
            const token = params.get('token') || '';
            if (username) document.getElementById('username').value = username;
            if (token) document.getElementById('token').value = token;
        }

        async function resetPassword() {
            const username = (document.getElementById('username').value || '').trim();
            const resetToken = (document.getElementById('token').value || '').trim();
            const newPassword = document.getElementById('newPassword').value || '';

            if (!username || !resetToken || !newPassword) {
                statusEl.textContent = 'Vui lòng nhập đầy đủ thông tin.';
                return;
            }

            statusEl.textContent = 'Đang đặt lại mật khẩu...';
            try {
                const response = await fetch('/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username,
                        reset_token: resetToken,
                        new_password: newPassword
                    })
                });
                const result = await response.json();
                if (!response.ok || !result.success) {
                    throw new Error(result.error || 'Đặt lại mật khẩu thất bại');
                }

                statusEl.textContent = 'Đặt lại mật khẩu thành công, đang chuyển về đăng nhập...';
                setTimeout(() => {
                    window.location.href = '/login';
                }, 1000);
            } catch (error) {
                statusEl.textContent = error.message;
            }
        }

        fillFromQuery();
        document.getElementById('btnReset').addEventListener('click', resetPassword);
    </script>
</body>
</html>

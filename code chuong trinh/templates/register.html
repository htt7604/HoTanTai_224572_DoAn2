<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - Smart Home</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            width: 100%;
            max-width: 460px;
            background: white;
            border-radius: 14px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            padding: 22px;
        }
        h1 { color: #4a5fcb; margin-bottom: 10px; }
        p { color: #666; margin-bottom: 16px; }
        .input {
            width: 100%;
            border: 2px solid #ddd;
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 10px;
            font-size: 15px;
        }
        .input:focus { outline: none; border-color: #667eea; }
        .btn {
            width: 100%;
            border: none;
            border-radius: 10px;
            background: #667eea;
            color: white;
            font-weight: 700;
            padding: 12px;
            cursor: pointer;
            margin-top: 4px;
        }
        .btn:hover { background: #5568d3; }
        .status {
            margin-top: 12px;
            border-radius: 10px;
            padding: 10px 12px;
            background: #f3f6ff;
            color: #1f3768;
            font-weight: 600;
            min-height: 42px;
        }
        .links { margin-top: 14px; text-align: center; }
        .links a { color: #4a5fcb; text-decoration: none; font-weight: 600; font-size: 14px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🆕 Tạo tài khoản</h1>
        <p>Tạo tài khoản để đăng nhập vào hệ thống. Hãy nhớ câu khôi phục để quên mật khẩu.</p>
        <input id="username" class="input" placeholder="Tên đăng nhập">
        <input id="password" type="password" class="input" placeholder="Mật khẩu">
        <input id="recoveryAnswer" class="input" placeholder="Câu trả lời khôi phục (bắt buộc khi quên mật khẩu)">
        <button id="btnRegister" class="btn">Đăng ký</button>
        <div id="status" class="status">Nhập thông tin để tạo tài khoản.</div>
        <div class="links"><a href="/login">Đã có tài khoản? Đăng nhập</a></div>
    </div>

    <script>
        const statusEl = document.getElementById('status');

        async function register() {
            const username = (document.getElementById('username').value || '').trim();
            const password = document.getElementById('password').value || '';
            const recoveryAnswer = (document.getElementById('recoveryAnswer').value || '').trim();

            if (!username || !password) {
                statusEl.textContent = 'Vui lòng nhập username và password.';
                return;
            }

            statusEl.textContent = 'Đang tạo tài khoản...';
            try {
                const response = await fetch('/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, recovery_answer: recoveryAnswer })
                });
                const result = await response.json();
                if (!response.ok || !result.success) {
                    throw new Error(result.error || 'Đăng ký thất bại');
                }
                statusEl.textContent = 'Đăng ký thành công, chuyển sang trang đăng nhập...';
                setTimeout(() => {
                    window.location.href = '/login';
                }, 800);
            } catch (error) {
                statusEl.textContent = error.message;
            }
        }

        document.getElementById('btnRegister').addEventListener('click', register);
    </script>
</body>
</html>

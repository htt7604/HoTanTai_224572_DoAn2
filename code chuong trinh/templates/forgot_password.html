<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quên mật khẩu - Smart Home</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            width: 100%;
            max-width: 480px;
            background: white;
            border-radius: 14px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            padding: 22px;
        }
        h1 { color: #4a5fcb; margin-bottom: 10px; }
        p { color: #666; margin-bottom: 16px; }
        .input {
            width: 100%;
            border: 2px solid #ddd;
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 10px;
            font-size: 15px;
        }
        .input:focus { outline: none; border-color: #667eea; }
        .btn {
            width: 100%;
            border: none;
            border-radius: 10px;
            background: #667eea;
            color: white;
            font-weight: 700;
            padding: 12px;
            cursor: pointer;
            margin-top: 4px;
        }
        .btn:hover { background: #5568d3; }
        .status {
            margin-top: 12px;
            border-radius: 10px;
            padding: 10px 12px;
            background: #f3f6ff;
            color: #1f3768;
            font-weight: 600;
            min-height: 42px;
            word-break: break-word;
        }
        .links {
            margin-top: 14px;
            display: flex;
            justify-content: space-between;
            gap: 12px;
        }
        .links a {
            color: #4a5fcb;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>🧩 Quên mật khẩu</h1>
        <p>Nhập tài khoản và câu trả lời khôi phục để nhận mã đặt lại mật khẩu.</p>
        <input id="username" class="input" placeholder="Tên đăng nhập">
        <input id="recoveryAnswer" class="input" placeholder="Câu trả lời khôi phục">
        <button id="btnRequest" class="btn">Lấy mã đặt lại</button>
        <div id="status" class="status">Nhập thông tin để yêu cầu reset password.</div>
        <div class="links">
            <a href="/login">Quay lại đăng nhập</a>
            <a href="/reset-password">Đã có reset token</a>
        </div>
    </div>

    <script>
        const statusEl = document.getElementById('status');

        async function requestResetToken() {
            const username = (document.getElementById('username').value || '').trim();
            const recoveryAnswer = (document.getElementById('recoveryAnswer').value || '').trim();

            if (!username || !recoveryAnswer) {
                statusEl.textContent = 'Vui lòng nhập username và recovery answer.';
                return;
            }

            statusEl.textContent = 'Đang tạo reset token...';
            try {
                const response = await fetch('/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, recovery_answer: recoveryAnswer })
                });
                const result = await response.json();
                if (!response.ok || !result.success) {
                    throw new Error(result.error || 'Yêu cầu thất bại');
                }

                const token = result.reset_token || '';
                statusEl.textContent = `Reset token: ${token} (hết hạn lúc ${result.expires_at || '--'})`;
                setTimeout(() => {
                    window.location.href = `/reset-password?username=${encodeURIComponent(username)}&token=${encodeURIComponent(token)}`;
                }, 1200);
            } catch (error) {
                statusEl.textContent = error.message;
            }
        }

        document.getElementById('btnRequest').addEventListener('click', requestResetToken);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Smart Home</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            width: 100%;
            max-width: 420px;
            background: white;
            border-radius: 14px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            padding: 22px;
        }
        h1 { color: #4a5fcb; margin-bottom: 10px; }
        p { color: #666; margin-bottom: 16px; }
        .input {
            width: 100%;
            border: 2px solid #ddd;
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 10px;
            font-size: 15px;
        }
        .input:focus { outline: none; border-color: #667eea; }
        .btn {
            width: 100%;
            border: none;
            border-radius: 10px;
            background: #667eea;
            color: white;
            font-weight: 700;
            padding: 12px;
            cursor: pointer;
            margin-top: 4px;
        }
        .btn:hover { background: #5568d3; }
        .status {
            margin-top: 12px;
            border-radius: 10px;
            padding: 10px 12px;
            background: #f3f6ff;
            color: #1f3768;
            font-weight: 600;
            min-height: 42px;
        }
        .links {
            margin-top: 14px;
            display: flex;
            justify-content: space-between;
            gap: 12px;
        }
        .links a {
            color: #4a5fcb;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>🔐 Đăng nhập</h1>
        <p>Đăng nhập để truy cập hệ thống Smart Home.</p>
        <input id="username" class="input" placeholder="Tên đăng nhập">
        <input id="password" type="password" class="input" placeholder="Mật khẩu">
        <button id="btnLogin" class="btn">Đăng nhập</button>
        <div id="status" class="status">Nhập thông tin để đăng nhập.</div>
        <div class="links">
            <a href="/register">Tạo tài khoản</a>
            <a href="/forgot-password">Quên mật khẩu</a>
        </div>
    </div>

    <script>
        const statusEl = document.getElementById('status');
        const nextUrl = new URLSearchParams(window.location.search).get('next') || '/';

        async function login() {
            const username = (document.getElementById('username').value || '').trim();
            const password = document.getElementById('password').value || '';

            if (!username || !password) {
                statusEl.textContent = 'Vui lòng nhập username và password.';
                return;
            }

            statusEl.textContent = 'Đang đăng nhập...';
            try {
                const response = await fetch('/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const result = await response.json();
                if (!response.ok || !result.success) {
                    throw new Error(result.error || 'Đăng nhập thất bại');
                }
                statusEl.textContent = 'Đăng nhập thành công, đang chuyển trang...';
                window.location.href = nextUrl;
            } catch (error) {
                statusEl.textContent = error.message;
            }
        }

        document.getElementById('btnLogin').addEventListener('click', login);
        document.getElementById('password').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') login();
        });
    </script>
</body>
</html>

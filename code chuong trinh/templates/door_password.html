<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý mật khẩu mở cửa</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 760px; margin: 0 auto; }
        .header { color: white; text-align: center; margin-bottom: 18px; }
        .header h1 { font-size: 2rem; margin-bottom: 8px; }
        .top-actions { text-align: center; margin-top: 8px; }
        .top-actions a {
            color: white; text-decoration: none; border: 1px solid rgba(255,255,255,.5);
            border-radius: 8px; padding: 8px 12px; display: inline-block;
        }
        .panel {
            background: white; border-radius: 14px; padding: 18px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.15); margin-bottom: 14px;
        }
        .panel h2 { color: #667eea; margin-bottom: 10px; }
        .input {
            width: 100%; border: 2px solid #ddd; border-radius: 8px;
            padding: 11px 12px; font-size: .95rem; margin-bottom: 10px;
        }
        .input:focus { outline: none; border-color: #667eea; }
        .btn {
            border: none; border-radius: 8px; padding: 11px 14px;
            font-weight: 700; cursor: pointer; color: white; width: 100%;
        }
        .btn-primary { background: #667eea; }
        .btn-primary:hover { background: #5568d3; }
        .status {
            background: #f1f4ff; color: #1f3768; border-radius: 10px;
            padding: 10px 12px; font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔐 Quản lý mật khẩu mở cửa</h1>
            <p>Tạo mới / đổi mật khẩu mở cửa</p>
            <div class="top-actions"><a href="/">← Quay lại trang điều khiển</a></div>
        </div>

        <div class="panel">
            <h2>Trạng thái hiện tại</h2>
            <div class="status" id="currentStatus">Đang tải...</div>
        </div>

        <div class="panel">
            <h2>Tạo hoặc đổi mật khẩu</h2>
            <input id="oldPassword" type="password" class="input" placeholder="Mật khẩu cũ (để trống nếu chưa khởi tạo)">
            <input id="newPassword" type="password" class="input" placeholder="Mật khẩu mới">
            <button id="btnSave" class="btn btn-primary">Lưu mật khẩu</button>
            <div class="status" id="saveStatus" style="margin-top: 10px;">Nhập thông tin để tạo/đổi mật khẩu.</div>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin;

        async function sha256Hex(text) {
            const data = new TextEncoder().encode(text || '');
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(byte => byte.toString(16).padStart(2, '0')).join('');
        }

        async function loadCurrent() {
            try {
                const response = await fetch(`${API_BASE}/door-password`);
                const result = await response.json();
                if (!result.success) throw new Error(result.error || 'Không tải được trạng thái');

                const el = document.getElementById('currentStatus');
                if (!result.is_initialized) {
                    el.textContent = 'Chưa có mật khẩu mở cửa. Bạn có thể tạo mới ngay.';
                    return;
                }

                el.textContent = `Đã có mật khẩu mở cửa | Cập nhật: ${result.updated_at || '--'}`;
            } catch (error) {
                document.getElementById('currentStatus').textContent = 'Lỗi: ' + error.message;
            }
        }

        async function savePassword() {
            const oldPassword = document.getElementById('oldPassword').value || '';
            const newPassword = document.getElementById('newPassword').value || '';
            const status = document.getElementById('saveStatus');

            if (!newPassword.trim()) {
                status.textContent = 'Vui lòng nhập mật khẩu mới.';
                return;
            }

            status.textContent = 'Đang lưu...';
            try {
                const oldHash = oldPassword.trim() ? await sha256Hex(oldPassword) : '';
                const newHash = await sha256Hex(newPassword);
                const response = await fetch(`${API_BASE}/door-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        old_password_hash: oldHash,
                        new_password_hash: newHash
                    })
                });

                const result = await response.json();
                if (!response.ok || !result.success) {
                    throw new Error(result.error || 'Lưu thất bại');
                }

                status.textContent = result.mode === 'initialize'
                    ? 'Khởi tạo mật khẩu cửa thành công.'
                    : 'Đổi mật khẩu cửa thành công.';

                document.getElementById('oldPassword').value = '';
                document.getElementById('newPassword').value = '';
                await loadCurrent();
            } catch (error) {
                status.textContent = 'Lỗi: ' + error.message;
            }
        }

        document.getElementById('btnSave').addEventListener('click', savePassword);
        loadCurrent();
    </script>
</body>
</html>
